commands.CmdLongDesc: |-
    Gosh is a powerful shell with LLM enhancement.

    Actually it is not a shell, but an enhanced wrapper for shells like zsh / bash. You can use your familiar shell as usual, but it is better than before.
commands.CmdShortDesc: Gosh is a powerful shell with LLM enhancement.
commands.CmdShortDescVersion: Print the version information
commands.GlobalOptsVerbosityDesc: Number for the log level verbosity (0, 1, or 2)
commands.VersionOptsOutputFormatDesc: Output format. One of (json, yaml)
